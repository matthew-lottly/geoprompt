name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "projects/strata[dev]"

      - name: Run tests
        run: |
          cd projects/strata
          python -m pytest -q

      - name: Generate paper tables
        run: |
          cd projects/strata
          python scripts/generate_tables.py

      - name: Upload tables artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-tables
          path: projects/strata/paper/tables
