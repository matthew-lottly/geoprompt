<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'>
  <title>Operations Briefing</title>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;background:#f7fbff;color:#17324d;margin:0;padding:0;}
    header{background:#1565c0;color:white;padding:24px 28px;}
    .sub{opacity:.9;font-size:0.95rem;margin-top:6px;}
    .wrap{padding:18px 24px 30px 24px;}
    .card{background:white;border-left:6px solid #1565c0;padding:16px 18px;margin:14px 0;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
    .artifact{margin-top:0.8rem;}
    .artifact svg{display:block;max-width:100%;height:auto;}
    .metric{font-size:2rem;font-weight:700;color:#1565c0;}
    .badge{display:inline-block;background:#e8f1ff;color:#17324d;padding:4px 10px;border-radius:999px;font-weight:600;}
    table{border-collapse:collapse;width:100%;}
    th,td{border:1px solid #d0d7de;padding:8px;text-align:left;}
    th{background:#f6f8fa;}
    footer{padding:12px 24px 24px 24px;font-size:.9rem;color:#555;}
  </style>
</head>
<body data-output-contract='executive-briefing-v1' data-theme='utilities'>
  <header>
    <h1>Operations Briefing</h1>
    <div class='sub'>GeoPrompt executive briefing &#183; theme: <span class='badge'>utilities</span></div>
  </header>
  <main class='wrap'>
    <section class='card artifact-card' data-artifact-type='map' aria-labelledby='section-0'>
      <h2 id='section-0'>Study Area</h2>
      <div class='artifact artifact-map'>
        <svg class='briefing-map-svg' viewBox='0 0 560 280' width='100%' height='280' role='img' aria-label='Study Area map preview'>
          <rect x='0' y='0' width='560' height='280' rx='12' fill='#ffffff' />
          <rect x='24.0' y='24.0' width='512.0' height='232.0' rx='10' fill='#f8fbff' stroke='#dbe7f3' />
          <text x='24.0' y='18' font-size='13' font-weight='700' fill='#17324d'>Study Area</text>
          <circle cx='243.4' cy='171.6' r='5' fill='#1565c0' stroke='#17324d' stroke-width='1.2' />
          <polyline points='60.6,213.8 462.9,45.1' fill='none' stroke='#1565c0' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' />
          <polygon points='24.0,256.0 536.0,256.0 536.0,24.0 24.0,24.0 24.0,256.0' fill='#1565c0' fill-opacity='0.18' stroke='#1565c0' stroke-width='2' />
        </svg>
      </div>
    </section>
    <section class='card artifact-card' data-artifact-type='chart' aria-labelledby='section-1'>
      <h2 id='section-1'>Risk Trend</h2>
      <div class='artifact artifact-chart'>
        <svg class='briefing-chart-svg' viewBox='0 0 560 260' width='100%' height='260' role='img' aria-label='Risk Trend chart'>
          <rect x='0' y='0' width='560' height='260' rx='12' fill='#ffffff' />
          <text x='90' y='18' font-size='13' font-weight='700' fill='#17324d'>Risk Trend</text>
          <text x='12' y='44.0' font-size='12' fill='#334155'>Baseline</text>
          <rect x='90' y='32.0' width='446.0' height='52.7' rx='5' fill='#1565c0' opacity='0.88' />
          <text x='544.0' y='44.0' font-size='12' fill='#17324d'>12.00</text>
          <text x='12' y='110.7' font-size='12' fill='#334155'>Upgrade</text>
          <rect x='90' y='98.7' width='148.7' height='52.7' rx='5' fill='#1565c0' opacity='0.88' />
          <text x='246.7' y='110.7' font-size='12' fill='#17324d'>4.00</text>
          <text x='12' y='177.3' font-size='12' fill='#334155'>Target</text>
          <rect x='90' y='165.3' width='74.3' height='52.7' rx='5' fill='#1565c0' opacity='0.88' />
          <text x='172.3' y='177.3' font-size='12' fill='#17324d'>2.00</text>
        </svg>
      </div>
    </section>
    <section class='card artifact-card' data-artifact-type='table' aria-labelledby='section-2'>
      <h2 id='section-2'>Priority Actions</h2>
      <div class='artifact artifact-table'>
        <table>
          <thead>
            <tr>
              <th>asset</th>
              <th>action</th>
              <th>priority</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>hospital</td>
              <td>backup feed</td>
              <td>high</td>
            </tr>
            <tr>
              <td>pump</td>
              <td>switch replacement</td>
              <td>medium</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <footer>Generated from GeoPrompt reporting and scenario outputs.</footer>
</body>
</html>
