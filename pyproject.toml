[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "geoprompt"
version = "0.2.0"
description = "Custom spatial analysis package with a lightweight spatial frame, GeoJSON workflows, and GeoPrompt equations."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
keywords = ["spatial-analysis", "gis", "geojson", "geometry"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Topic :: Scientific/Engineering :: GIS",
    "Typing :: Typed",
]
dependencies = [
    "typing-extensions>=4.8; python_version < '3.11'",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2,<9.0",
    "pytest-cov>=5.0,<7.0",
    "hypothesis>=6.112,<7.0",
    "mypy>=1.11,<2.0",
    "nox>=2024.4.15",
    "tox>=4.18,<5.0",
    "pre-commit>=3.8,<5.0",
    "ruff>=0.6,<1.0",
    "ipykernel>=6.29,<7.0",
    "nbclient>=0.10,<1.0",
    "nbformat>=5.10,<6.0",
    "notebook>=7.3,<8.0",
]
