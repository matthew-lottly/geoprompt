name: Environmental Monitoring Analytics CI

on:
  push:
    paths:
      - ".github/workflows/environmental-monitoring-analytics-ci.yml"
      - "projects/environmental-monitoring-analytics/**"
  pull_request:
    paths:
      - ".github/workflows/environmental-monitoring-analytics-ci.yml"
      - "projects/environmental-monitoring-analytics/**"

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/environmental-monitoring-analytics
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest