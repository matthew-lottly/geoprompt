name: Geoprompt CI

on:
  push:
    paths:
      - ".github/workflows/geoprompt-ci.yml"
      - "pyproject.toml"
      - "README.md"
      - "PUBLISHING.md"
      - "src/**"
      - "tests/**"
      - "data/**"
      - "docs/**"
  pull_request:
    paths:
      - ".github/workflows/geoprompt-ci.yml"
      - "pyproject.toml"
      - "README.md"
      - "PUBLISHING.md"
      - "src/**"
      - "tests/**"
      - "data/**"
      - "docs/**"

jobs:
  validate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Install Geoprompt with validation extras
        run: python -m pip install -e ".[dev,compare,overlay,projection]"

      - name: Run docs gates (flowchart, markdown, simulation docstrings)
        run: |
          python -m pytest tests/test_docs_readme_flowchart_gate.py -q
          python -m pytest tests/test_docs_markdown_gate.py -q
          python -m pytest tests/test_docs_link_integrity_gate.py -q
          python -m pytest tests/test_markdown_hygiene_gate.py -q
          python -m pytest tests/test_docs_api_contract_gate.py -q
          python -m pytest tests/test_figure_manifest_gate.py -q
          python -m pytest tests/test_claims_to_tests_manifest.py -q
          python -m pytest tests/test_simulation_only_docs.py -q

      - name: Run trust and artifact contract gates
        run: |
          python -m pytest tests/test_release_evidence.py -q
          python -m pytest tests/test_failure_transparency.py -q
          python -m pytest tests/test_output_quality_gates.py -q

      - name: Run tests
        run: python -m pytest

      - name: Generate demo outputs
        run: python -m geoprompt.demo

      - name: Run comparison corpus
        run: python -m geoprompt.compare

      - name: Rebuild docs artifacts and verify freshness
        run: |
          python -m geoprompt.cli docs-artifacts --output-dir outputs --clean
          python -m geoprompt.cli docs-artifacts --output-dir outputs --check
          python -m pytest tests/test_artifact_freshness_gate.py -q

      - name: Execute notebooks with timeout
        run: python examples/notebooks/execute_notebooks_with_timeout.py --timeout 20

      - name: Run flagship persona examples
        run: |
          python examples/personas/analyst_resilience_screen.py
          python examples/personas/executive_briefing_pack.py
          python examples/personas/operations_dispatch.py
          python examples/personas/database_roundtrip_demo.py

      - name: Build distribution artifacts
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload benchmark and demo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geoprompt-artifacts-py${{ matrix.python-version }}
          path: |
            outputs/**
            dist/**
          if-no-files-found: ignore

  optional-gated:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        extra-profile: ["io", "viz", "service"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip

      - name: Install Geoprompt with selected extras
        run: python -m pip install -e ".[dev,${{ matrix.extra-profile }}]"

      - name: Run optional geospatial integration test gate
        if: matrix.extra-profile == 'io'
        env:
          GEOPROMPT_RUN_GEO_IO: "1"
        run: python -m pytest tests/test_geoprompt.py::test_geospatial_integration_parquet_round_trip

      - name: Run visualization and platform tests
        if: matrix.extra-profile == 'viz'
        run: python -m pytest tests/test_platform_remaining_push.py

      - name: Run service smoke test
        if: matrix.extra-profile == 'service'
        run: python -c "import geoprompt.service; print('service ok')"

      - name: Run benchmark regression gate
        if: matrix.extra-profile == 'io'
        env:
          GEOPROMPT_RUN_BENCHMARKS: "1"
        run: python -m pytest tests/test_benchmark_regression.py
