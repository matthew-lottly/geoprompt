name: Security and Quality

on:
  push:
    paths:
      - ".github/workflows/security-quality.yml"
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
      - "docs/**"
  pull_request:
    paths:
      - ".github/workflows/security-quality.yml"
      - "pyproject.toml"
      - "src/**"
      - "tests/**"
      - "docs/**"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,compare,overlay,projection]"
          python -m pip install pytest-cov bandit build

      - name: Run tests with coverage
        run: python -m pytest --cov=geoprompt --cov-report=xml --cov-report=term

      - name: Run Bandit scan
        run: python -m bandit -q -r src/geoprompt

      - name: Build docs and package metadata
        run: |
          python -m compileall src docs
          python -m build
