name: Monitoring Data Warehouse CI

"on":
  push:
    paths:
      - ".github/workflows/monitoring-data-warehouse-ci.yml"
      - "projects/monitoring-data-warehouse/**"
  pull_request:
    paths:
      - ".github/workflows/monitoring-data-warehouse-ci.yml"
      - "projects/monitoring-data-warehouse/**"

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/monitoring-data-warehouse
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest