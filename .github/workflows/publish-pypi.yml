name: Publish Geoprompt To PyPI

on:
  push:
    tags:
      - "geoprompt-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: projects/geoprompt
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distribution artifacts
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Publish package distributions to PyPI with API token
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: projects/geoprompt/dist/
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish package distributions to PyPI with Trusted Publishing
        if: ${{ secrets.PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: projects/geoprompt/dist/