name: Publish To PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Install Geoprompt with release validation extras
        run: python -m pip install -e ".[dev,viz,compare,service]"

      - name: Run release smoke tests
        run: python -m pytest tests/test_section_d_notebooks.py -q

      - name: Generate demo outputs
        run: python -m geoprompt.demo

      - name: Build distribution artifacts
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1