<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Station forecasting workbench preview</title>
  <desc id="desc">Concept preview of holdout evaluation, baseline forecasts, and projected station values.</desc>
