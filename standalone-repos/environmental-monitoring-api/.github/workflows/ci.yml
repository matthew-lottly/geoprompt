name: Environmental Monitoring API CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest

  postgis-integration:
    runs-on: ubuntu-latest
    services:
      postgis:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: spatial
          POSTGRES_USER: spatial
          POSTGRES_PASSWORD: spatial
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spatial -d spatial"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Initialize database schema and seed data
        env:
          PGPASSWORD: spatial
        run: |
          psql -h localhost -U spatial -d spatial -f sql/postgis_schema.sql
          psql -h localhost -U spatial -d spatial -f sql/sample_seed.sql

      - name: Run PostGIS integration tests
        env:
          SPATIAL_DATA_API_RUN_DB_TESTS: "1"
          SPATIAL_DATA_API_INTEGRATION_DB_URL: postgresql+psycopg://spatial:spatial@localhost:5432/spatial
        run: pytest tests/integration

  docker-image:
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - postgis-integration
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/environmental-monitoring-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}